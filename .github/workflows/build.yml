name: Build y Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos al gradlew
        run: chmod +x gradlew

      - name: Correr tests y generar reporte Jacoco
        run: ./gradlew test jacocoTestReport -Dorg.gradle.java.home=$JAVA_HOME

      - name: Publicar reporte de coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/